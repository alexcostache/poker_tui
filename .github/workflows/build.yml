name: Build poker_tui

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"
          cache: true

      - name: Build binary
        run: go build -o poker_tui ./cmd/poker_tui

      - uses: actions/upload-artifact@v4
        with:
          name: poker_tui-linux
          path: poker_tui

  build-windows:
    runs-on: windows-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"
          cache: true

      - name: Build binary
        run: go build -o poker_tui.exe ./cmd/poker_tui

      - uses: actions/upload-artifact@v4
        with:
          name: poker_tui-windows
          path: poker_tui.exe